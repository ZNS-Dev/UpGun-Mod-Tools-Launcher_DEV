name: Build & Release

on:
  push:
    tags:
      - 'v*' # S'exécute uniquement lorsqu'un tag type v1.0.0 est pushed
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    name: Build (${{ matrix.os }} - ${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact_name: UpGun-Mod-Tools-Launcher-Windows-x64
          - os: ubuntu-latest
            rid: linux-x64
            artifact_name: UpGun-Mod-Tools-Launcher-Linux-x64
          - os: macos-latest
            rid: osx-x64
            artifact_name: UpGun-Mod-Tools-Launcher-macOS-x64
          - os: macos-latest
            rid: osx-arm64
            artifact_name: UpGun-Mod-Tools-Launcher-macOS-arm64

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration de .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x' # Ajuste selon ta version cible de .NET

      - name: Extraction du nom de version (depuis le Tag)
        id: get_version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$VERSION" == "main" || "$VERSION" == "master" ]]; then VERSION="1.0.0-dev"; fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Compilation & Publication (.NET Publish)
        run: >
          dotnet publish
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:Version=${{ steps.get_version.outputs.VERSION }}
          -o ./publish/${{ matrix.artifact_name }}

      - name: Compression de l'artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path ./publish/${{ matrix.artifact_name }}/* -DestinationPath ./${{ matrix.artifact_name }}.zip

      - name: Compression de l'artifact (Linux / macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd ./publish/${{ matrix.artifact_name }}
          zip -r "../../${{ matrix.artifact_name }}.zip" .

      - name: Upload de l'artifact temporaire
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ./${{ matrix.artifact_name }}.zip

  release:
    name: Créer le Release GitHub
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Telechargement de tous les artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Restructuration des fichiers zip
        run: |
          mkdir -p ./dist
          find ./artifacts -name "*.zip" -exec cp {} ./dist/ \;
          ls -la ./dist

      - name: Publication de la Release GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/*.zip
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}